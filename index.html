<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>E-Presensi Kelas 6 SD 3 Jojo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #F8FAFC; }
    .pastel-success { background-color: #E8F5E9; color: #2E7D32; } 
    .pastel-danger { background-color: #FFEBEE; color: #C62828; } 
    .pastel-warning { background-color: #FFF3E0; color: #EF6C00; } 
    .toast { animation: slideIn 0.3s ease-out forwards; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .video-container { position: relative; background-color: #0F172A; border-radius: 1rem; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    #canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    video { width: 100%; height: 100%; object-fit: cover; }
    @media print {
      body * { visibility: hidden; }
      #area-cetak-leger, #area-cetak-leger * { visibility: visible; }
      #area-cetak-leger { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="text-slate-700">

  <script>
    // MASUKKAN URL DEPLOY APPS SCRIPT ANDA DI BAWAH INI
    const API_URL = "https://script.google.com/macros/s/AKfycbwK5cnXfJmxcSZpzG0prl8ecu5CtmG-Uy3BCAFRbMEV7laYZS8SDX0fr2pCipba0Pl46Q/exec";
  </script>

  <div id="container-toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-full max-w-sm px-4"></div>

  <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 no-print">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md shadow-indigo-200">E</div>
          <div>
            <span class="font-semibold text-lg text-slate-900 block leading-tight">E-Presensi</span>
            <span class="text-xs text-slate-500">SD 3 Jojo - Kelas 6</span>
          </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-4 overflow-x-auto">
          <button onclick="pindahTab('scan')" id="btn-tab-scan" class="px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-indigo-50 text-indigo-600 whitespace-nowrap">Scan Wajah</button>
          <button onclick="pindahTab('leger')" id="btn-tab-leger" class="px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:bg-slate-50 whitespace-nowrap">Leger</button>
          <button onclick="pindahTab('admin')" id="btn-tab-admin" class="px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:bg-slate-50 whitespace-nowrap">Daftar</button>
          <button onclick="pindahTab('libur')" id="btn-tab-libur" class="px-3 sm:px-4 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:bg-slate-50 whitespace-nowrap">Libur</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <section id="tab-scan" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-4">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
          <h2 class="text-xl font-semibold text-slate-900">Pemindai Kehadiran Mandiri</h2>
          <div class="flex justify-center mt-3 mb-4">
            <input type="date" id="input-tanggal-scan" class="bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl text-sm font-medium text-slate-700 outline-none cursor-pointer">
          </div>
          
          <div class="video-container shadow-inner aspect-[4/3] sm:aspect-video w-full max-w-2xl mx-auto mb-4 border-4 border-slate-100 ring-2 ring-indigo-50">
            <video id="video-feed" autoplay muted playsinline></video>
            <canvas id="canvas-overlay"></canvas>
            <div id="loader-kamera" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 text-white gap-3 transition-opacity duration-300">
              <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              <p class="text-sm font-medium text-slate-400">Menyiapkan AI Wajah Resolusi Tinggi...</p>
            </div>
          </div>
          
          <div id="status-nama-scan" class="text-sm font-bold text-indigo-600 animate-pulse h-6 mb-4">🤖 Menunggu Wajah...</div>

          <button onclick="toggleCamera()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2 rounded-xl text-sm font-medium transition inline-flex items-center gap-2">
            🔄 Putar Kamera
          </button>
        </div>
      </div>

      <div class="space-y-6">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-[520px]">
          <div class="border-b border-slate-100 pb-4 mb-4 flex justify-between items-center">
            <h3 class="font-semibold text-slate-900 text-lg">Daftar Hadir</h3>
            <span id="counter-hadir" class="text-xs bg-indigo-50 text-indigo-600 font-medium px-2.5 py-1 rounded-full">0 Siswa</span>
          </div>
          <div id="list-log-harian" class="flex-1 overflow-y-auto space-y-3 pr-1 text-sm">
            <div class="text-center py-8 text-slate-400">Memuat data...</div>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-leger" class="hidden space-y-6">
      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm no-print">
        <div class="flex flex-col gap-4">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center">
            <div>
              <h2 class="text-xl font-semibold text-slate-900">Leger & Laporan Bulanan</h2>
            </div>
            <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto mt-3 sm:mt-0">
              <select id="filter-bulan" class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium shadow-sm outline-none text-slate-700">
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
              </select>
              <select id="filter-tahun" class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium shadow-sm outline-none text-slate-700"></select>
            </div>
          </div>
          <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
            <button onclick="bukaModalManual()" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl text-sm font-medium transition">➕ Input Manual Siswa</button>
            <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition">🖨️ Cetak</button>
          </div>
        </div>
      </div>

      <div id="area-cetak-leger" class="bg-white p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto">
        <div id="konten-tabel-leger" class="min-w-max text-sm text-slate-700"></div>
      </div>
    </section>

    <section id="tab-admin" class="hidden max-w-2xl mx-auto">
      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
        <div><h2 class="text-xl font-semibold text-slate-900">Registrasi Biometrik Siswa</h2></div>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-500 uppercase mb-1.5">NISN</label>
            <input type="number" id="reg-nisn" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 uppercase mb-1.5">Nama Lengkap</label>
            <input type="text" id="reg-nama" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 uppercase mb-1.5">No. WhatsApp</label>
            <input type="text" id="reg-kontak" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm">
          </div>
          <div class="p-4 bg-slate-50 rounded-xl border border-slate-200 text-center space-y-3">
            <button onclick="ambilSampelBiometrik()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-medium shadow">📸 Ambil Koordinat Wajah</button>
            <div id="status-biometrik" class="text-xs text-amber-600 font-medium">Belum Diambil</div>
          </div>
          <button onclick="simpanRegistrasiSiswa()" id="btn-simpan-siswa" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-medium text-sm">Simpan Data Siswa</button>
        </div>
      </div>
    </section>

    <section id="tab-libur" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 md:col-span-1 space-y-4">
        <h3 class="text-base font-semibold text-slate-800">Manajemen Libur</h3>
        <div class="space-y-3">
          <input type="date" id="libur-tgl" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm">
          <input type="text" id="libur-ket" placeholder="Keterangan Libur" class="w-full px-4 py-2 rounded-xl border border-slate-200 text-sm">
          <button onclick="simpanLiburManual()" class="w-full bg-teal-500 text-white font-medium py-2 rounded-xl text-sm transition">💾 Simpan Libur</button>
        </div>
        <hr>
        <button onclick="tarikLiburNasional()" class="w-full bg-indigo-500 text-white font-medium py-2 rounded-xl text-sm transition">🔄 Tarik Libur Nasional</button>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 md:col-span-2">
        <h3 class="text-base font-semibold text-slate-800 mb-4">Agenda Hari Libur</h3>
        <div class="overflow-y-auto max-h-[400px] divide-y divide-slate-100" id="daftar-hari-libur"></div>
      </div>
    </section>
  </main>

  <div id="modal-manual" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[999] p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl max-h-[80vh] flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-base font-semibold text-slate-800">Siswa Belum Presensi</h3>
        <button onclick="tutupModalManual()" class="text-slate-400 font-bold text-xl">&times;</button>
      </div>
      <div class="overflow-y-auto flex-1 divide-y divide-slate-100 text-sm" id="daftar-belum-absen"></div>
    </div>
  </div>

  <script>
    const MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/";
    
    let databaseSiswaCache = [];
    let kehadiranHariIniCache = [];
    let daftarLiburCache = JSON.parse(localStorage.getItem('daftar_libur_sekolah')) || {};
    let faceMatcher = null;
    let localStream = null;
    let currentFacingMode = "user";
    let isAIEngineReady = false;
    let activeTab = "scan";
    let temporaryDescriptor = null;
    let flagScanSuksesCooldown = false;

    document.getElementById('input-tanggal-scan').value = new Date().toISOString().split('T')[0];

    const selectTahun = document.getElementById('filter-tahun');
    const tahunSekarang = new Date().getFullYear();
    for(let t = tahunSekarang - 2; t <= tahunSekarang + 2; t++) {
      let opt = document.createElement('option'); opt.value = t; opt.innerText = t;
      if(t === tahunSekarang) opt.selected = true;
      selectTahun.appendChild(opt);
    }

    window.addEventListener('load', async () => {
      try {
        // MENGGUNAKAN SSD MOBILENET AGAR AKURASI HP MAKSIMAL
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        isAIEngineReady = true;
        document.getElementById('loader-kamera').classList.add('opacity-0');
        showToast("AI Pengenalan Wajah Aktif", "success");
        
        await sinkronisasiDatabaseSiswa();
        await aktifkanKameraDanLoop();
        await muatLogKehadiranHarian();
      } catch (err) {
        showToast("Gagal memuat AI. Pastikan internet lancar.", "danger");
      }
    });

    async function sinkronisasiDatabaseSiswa() {
      try {
        const res = await fetch(`${API_URL}?action=getSiswa`);
        databaseSiswaCache = await res.json();
        
        const labeledDescriptors = [];
        databaseSiswaCache.forEach(siswa => {
          if (siswa.descriptor && siswa.descriptor.descriptors) {
            const floatDescriptors = siswa.descriptor.descriptors.map(d => new Float32Array(d));
            labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(siswa.nisn, floatDescriptors));
          }
        });
        if (labeledDescriptors.length > 0) faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
      } catch (e) { showToast("Gagal menyinkronkan database siswa.", "danger"); }
    }

    function toggleCamera() {
      currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
      aktifkanKameraDanLoop();
    }

    async function aktifkanKameraDanLoop() {
      const video = document.getElementById('video-feed');
      const canvas = document.getElementById('canvas-overlay');
      if(localStream) localStream.getTracks().forEach(track => track.stop());
      
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false
        });
        video.srcObject = localStream;
        
        // Cermin otomatis JIKA menggunakan kamera depan
        if (currentFacingMode === "user") {
          video.style.transform = "scaleX(-1)"; canvas.style.transform = "scaleX(-1)";
        } else {
          video.style.transform = "none"; canvas.style.transform = "none";
        }
        
        mulaiLoopScanOtomatis(video, canvas);
      } catch (err) { showToast("Kamera tidak diizinkan.", "danger"); }
    }

    function mulaiLoopScanOtomatis(video, canvas) {
      const konteks = canvas.getContext('2d');
      const statusIndikator = document.getElementById('status-nama-scan');

      video.addEventListener('play', () => {
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        faceapi.matchDimensions(canvas, displaySize);

        async function step() {
          if (activeTab !== "scan" || video.paused || video.ended) return requestAnimationFrame(step);

          // Sensitivitas SsdMobilenetv1 diturunkan ke 0.45 agar HP mudah mendeteksi
          const deteksi = await faceapi.detectSingleFace(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.45 }))
                                        .withFaceLandmarks()
                                        .withFaceDescriptor();
          konteks.clearRect(0, 0, canvas.width, canvas.height);

          if (deteksi) {
            const resizedDeteksi = faceapi.resizeResults(deteksi, displaySize);
            const box = resizedDeteksi.detection.box;
            
            konteks.strokeStyle = "#4F46E5"; konteks.lineWidth = 4;
            konteks.strokeRect(box.x, box.y, box.width, box.height);

            if (faceMatcher && resizedDeteksi.descriptor && !flagScanSuksesCooldown) {
              const hasilCocok = faceMatcher.findBestMatch(resizedDeteksi.descriptor);
              konteks.fillStyle = "#4F46E5"; konteks.font = "bold 16px Poppins";
              konteks.fillText(`${hasilCocok.label} (${Math.round((1 - hasilCocok.distance)*100)}%)`, box.x, box.y - 10);
              
              statusIndikator.innerText = `Memproses: ${hasilCocok.label !== 'unknown' ? hasilCocok.label : 'Wajah Tidak Dikenal'}...`;

              if (hasilCocok.label !== "unknown") {
                flagScanSuksesCooldown = true;
                await onWajahTerdeteksi(hasilCocok.label);
                setTimeout(() => { flagScanSuksesCooldown = false; statusIndikator.innerText = "🤖 Menunggu Wajah..."; }, 4000);
              }
            }
          } else { statusIndikator.innerText = "🤖 Menunggu Wajah..."; }
          
          setTimeout(() => { requestAnimationFrame(step); }, 600); // 600ms = enteng di HP
        }
        requestAnimationFrame(step);
      });
    }

    async function onWajahTerdeteksi(nisn) {
      const siswa = databaseSiswaCache.find(s => s.nisn === nisn);
      if(!siswa) return;
      const tanggalPilihan = document.getElementById('input-tanggal-scan').value;

      try {
        const respon = await fetch(API_URL, {
          method: "POST", body: JSON.stringify({ action: "presensi", nisn: siswa.nisn, nama: siswa.nama, status: "Hadir", tanggal: tanggalPilihan, overwrite: true })
        });
        const hasil = await respon.json();
        
        if (hasil.status === "sukses") {
          showToast(`Berhasil: ${siswa.nama} Tercatat!`, "success");
          document.getElementById('status-nama-scan').innerText = `✅ SUKSES: ${siswa.nama}`;
          
          // Audio SpeechSynthesis Text-to-Speech
          if ('speechSynthesis' in window) {
            const pesanSuara = new SpeechSynthesisUtterance(`${siswa.nama}, Hadir`);
            pesanSuara.lang = 'id-ID';
            window.speechSynthesis.speak(pesanSuara);
          }
          await muatLogKehadiranHarian();
        }
      } catch (err) { showToast("Koneksi bermasalah.", "danger"); }
    }

    async function muatLogKehadiranHarian() {
      const container = document.getElementById('list-log-harian');
      const counterEl = document.getElementById('counter-hadir');
      const tglSelected = document.getElementById('input-tanggal-scan').value;

      try {
        const res = await fetch(`${API_URL}?action=getKehadiran&tanggal=${tglSelected}`);
        kehadiranHariIniCache = await res.json(); // Simpan ke cache untuk Input Manual
        
        container.innerHTML = ""; let jmlHadir = 0;

        if(kehadiranHariIniCache.length === 0) {
          container.innerHTML = `<div class="text-center py-8 text-slate-400">Belum ada atau tidak ada data presensi.</div>`;
          counterEl.innerText = "0 Siswa"; return;
        }

        kehadiranHariIniCache.forEach(item => {
          if(item.status === "Hadir") jmlHadir++;
          let statusClass = item.status === "Hadir" ? "pastel-success" : (item.status === "Sakit" ? "pastel-warning" : (item.status === "Izin" ? "bg-blue-50 text-blue-600" : "pastel-danger"));
          container.innerHTML += `
            <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl">
              <div><p class="font-medium text-slate-900">${item.nama}</p><p class="text-xs text-slate-400">${item.nisn}</p></div>
              <div class="flex items-center gap-2">
                <span class="px-2.5 py-1 text-xs font-semibold rounded-lg ${statusClass}">${item.status}</span>
                <div class="flex border border-slate-200 rounded-lg overflow-hidden bg-white">
                  <button onclick="ubahStatusManual('${item.nisn}', '${item.nama}', 'Hadir')" class="px-2 py-1 text-xs font-bold text-emerald-600 border-r">H</button>
                  <button onclick="ubahStatusManual('${item.nisn}', '${item.nama}', 'Sakit')" class="px-2 py-1 text-xs font-bold text-amber-600 border-r">S</button>
                  <button onclick="ubahStatusManual('${item.nisn}', '${item.nama}', 'Izin')" class="px-2 py-1 text-xs font-bold text-blue-600 border-r">I</button>
                  <button onclick="ubahStatusManual('${item.nisn}', '${item.nama}', 'Alpa')" class="px-2 py-1 text-xs font-bold text-rose-600">A</button>
                </div>
              </div>
            </div>`;
        });
        counterEl.innerText = `${jmlHadir} / ${kehadiranHariIniCache.length} Hadir`;
      } catch (err) { container.innerHTML = `<div class="text-center py-8 text-rose-500 font-medium">Gagal memuat rekap.</div>`; }
    }

    async function ubahStatusManual(nisn, nama, statusFull) {
      const tglSelected = document.getElementById('input-tanggal-scan').value;
      showToast(`Mengubah ${nama} menjadi ${statusFull}...`, "warning");
      try {
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "presensi", nisn: nisn, nama: nama, status: statusFull, tanggal: tglSelected, overwrite: true }) });
        showToast("Sukses!", "success");
        await muatLogKehadiranHarian();
        if(activeTab === "leger") await muatTabelLegerBulan();
        tutupModalManual();
      } catch(e) { showToast("Gagal ubah status.", "danger"); }
    }
    document.getElementById('input-tanggal-scan').addEventListener('change', muatLogKehadiranHarian);

    function bukaModalManual() {
      const container = document.getElementById('daftar-belum-absen'); container.innerHTML = "";
      // LOGIKA BARU: Hanya tampilkan siswa yang BELUM ada di log atau berstatus Alpa
      const siswaBelumAbsen = databaseSiswaCache.filter(dbSiswa => {
        const cekAbsen = kehadiranHariIniCache.find(k => k.nisn === dbSiswa.nisn);
        return !cekAbsen || cekAbsen.status === "Alpa";
      });

      if(siswaBelumAbsen.length === 0) { container.innerHTML = "<p class='p-4 text-center text-slate-400'>Seluruh siswa sudah terekam kehadirannya.</p>"; }
      else {
        siswaBelumAbsen.forEach(s => {
          container.innerHTML += `
            <div class="py-3 flex justify-between items-center gap-2 border-b border-slate-100 last:border-0">
              <span class="font-medium text-slate-700">${s.nama}</span>
              <div class="flex gap-1">
                <button onclick="ubahStatusManual('${s.nisn}','${s.nama}','Sakit')" class="bg-amber-500 text-white px-3 py-1 rounded-lg">Sakit</button>
                <button onclick="ubahStatusManual('${s.nisn}','${s.nama}','Izin')" class="bg-blue-500 text-white px-3 py-1 rounded-lg">Izin</button>
                <button onclick="ubahStatusManual('${s.nisn}','${s.nama}','Alpa')" class="bg-rose-500 text-white px-3 py-1 rounded-lg">Alpa</button>
              </div>
            </div>`;
        });
      }
      document.getElementById('modal-manual').classList.replace('hidden', 'flex');
    }
    function tutupModalManual() { document.getElementById('modal-manual').classList.replace('flex', 'hidden'); }

    // ================== MENU LIBUR ==================
    tampilkanHariLibur();
    function simpanLiburManual() {
      const tgl = document.getElementById('libur-tgl').value;
      const ket = document.getElementById('libur-ket').value.trim();
      if(!tgl || !ket) return showToast("Isi form libur!", "danger");
      daftarLiburCache[tgl] = ket;
      localStorage.setItem('daftar_libur_sekolah', JSON.stringify(daftarLiburCache));
      showToast("Tersimpan!", "success"); tampilkanHariLibur();
    }
    function hapusLibur(tgl) { delete daftarLiburCache[tgl]; localStorage.setItem('daftar_libur_sekolah', JSON.stringify(daftarLiburCache)); tampilkanHariLibur(); }
    function editLibur(tgl) {
      document.getElementById('libur-tgl').value = tgl;
      document.getElementById('libur-ket').value = daftarLiburCache[tgl];
      showToast("Silakan edit dan tekan simpan", "warning");
    }
    function tampilkanHariLibur() {
      const box = document.getElementById('daftar-hari-libur'); box.innerHTML = "";
      const keys = Object.keys(daftarLiburCache).sort();
      if(keys.length === 0) return box.innerHTML = "<p class='p-4 text-center text-slate-400'>Tidak ada libur terdaftar.</p>";
      keys.forEach(k => {
        box.innerHTML += `
          <div class="py-3 flex justify-between items-center text-sm">
            <span>📅 <b>${k}</b> - ${daftarLiburCache[k]}</span>
            <div class="space-x-2">
              <button onclick="editLibur('${k}')" class="text-blue-500 font-medium">Edit</button>
              <button onclick="hapusLibur('${k}')" class="text-rose-500 font-medium">Hapus</button>
            </div>
          </div>`;
      });
    }

    async function tarikLiburNasional() {
      const thn = new Date().getFullYear();
      showToast("Menarik data libur...", "warning");
      try {
        const res = await fetch(`https://dayoffapi.vercel.app/api?year=${thn}`);
        if(!res.ok) throw new Error("Gagal");
        const data = await res.json();
        let jml = 0;
        data.forEach(l => { if(l.tanggal && l.is_cuti === false) { daftarLiburCache[l.tanggal] = l.keterangan; jml++; } });
        localStorage.setItem('daftar_libur_sekolah', JSON.stringify(daftarLiburCache));
        showToast(`Sukses menarik ${jml} hari libur nasional!`, "success"); tampilkanHariLibur();
      } catch (e) { showToast("Gagal API Libur Nasional.", "danger"); }
    }

    // ================== REGISTRASI & LEGER ==================
    async function ambilSampelBiometrik() {
      const video = document.getElementById('video-feed');
      const deteksi = await faceapi.detectSingleFace(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 })).withFaceLandmarks().withFaceDescriptor();
      if(!deteksi) return showToast("Wajah tidak jelas!", "danger");
      temporaryDescriptor = deteksi.descriptor;
      document.getElementById('status-biometrik').innerText = "Koordinat Terekam!";
      document.getElementById('status-biometrik').className = "text-xs text-emerald-600 font-bold mt-2";
      showToast("Berhasil ambil sampel!", "success");
    }

    async function simpanRegistrasiSiswa() {
      const n = document.getElementById('reg-nisn').value; const m = document.getElementById('reg-nama').value; const k = document.getElementById('reg-kontak').value;
      if(!n || !m || !temporaryDescriptor) return showToast("Form / Sampel kosong!", "danger");
      document.getElementById('btn-simpan-siswa').innerText = "Menyimpan...";
      try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "register", nisn: n, nama: m, kontak: k, descriptor: JSON.stringify({descriptors: [Array.from(temporaryDescriptor)], label: n}) }) });
        const r = await res.json();
        if(r.status === "sukses") { showToast("Terdaftar!", "success"); await sinkronisasiDatabaseSiswa(); temporaryDescriptor=null; }
      } catch (e) { showToast("Gagal registrasi.", "danger"); }
      finally { document.getElementById('btn-simpan-siswa').innerText = "Simpan Data Siswa"; }
    }

    async function muatTabelLegerBulan() {
      const bln = document.getElementById('filter-bulan').value; const thn = document.getElementById('filter-tahun').value;
      const c = document.getElementById('konten-tabel-leger'); c.innerHTML = `<div class="text-center py-8">Memuat matriks...</div>`;
      const jHari = new Date(thn, bln, 0).getDate();
      try {
        const janji = [];
        for(let d=1; d<=jHari; d++) janji.push(fetch(`${API_URL}?action=getKehadiran&tanggal=${thn}-${String(bln).padStart(2,'0')}-${String(d).padStart(2,'0')}`).then(r=>r.json()));
        const hBulan = await Promise.all(janji);
        
        let ht = `<table class="w-full border border-slate-300 text-center text-xs"><thead><tr class="bg-slate-100"><th class="border border-slate-300 px-2 py-2">NO</th><th class="border border-slate-300 px-2">NAMA</th>`;
        for(let d=1; d<=jHari; d++) ht += `<th class="border border-slate-300 p-1">${d}</th>`;
        ht += `<th class="border border-slate-300 p-1">H</th><th class="border border-slate-300 p-1">S</th><th class="border border-slate-300 p-1">I</th><th class="border border-slate-300 p-1">A</th></tr></thead><tbody>`;

        databaseSiswaCache.forEach((s, i) => {
          let h=0, sk=0, iz=0, a=0;
          ht += `<tr><td class="border border-slate-300">${i+1}</td><td class="border border-slate-300 text-left px-2">${s.nama}</td>`;
          for(let d=1; d<=jHari; d++) {
            let strKey = `${thn}-${String(bln).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let day = new Date(thn, bln-1, d).getDay();
            
            let stat = "Alpa";
            if(hBulan[d-1] && hBulan[d-1].length > 0) {
              let cari = hBulan[d-1].find(x => x.nisn === s.nisn);
              if(cari) stat = cari.status;
            } else {
              stat = ""; // Jika tidak ada record sama sekali
            }

            if(day===0 || daftarLiburCache[strKey]) ht += `<td class="border bg-slate-100">L</td>`;
            else {
              if(stat==="Hadir") { ht += `<td class="border text-emerald-600">H</td>`; h++; }
              else if(stat==="Sakit") { ht += `<td class="border text-amber-500">S</td>`; sk++; }
              else if(stat==="Izin") { ht += `<td class="border text-blue-500">I</td>`; iz++; }
              else if(stat==="Alpa") { ht += `<td class="border text-rose-500">A</td>`; a++; }
              else { ht += `<td class="border"></td>`; } // Kosong
            }
          }
          ht += `<td class="border">${h}</td><td class="border">${sk}</td><td class="border">${iz}</td><td class="border">${a}</td></tr>`;
        });
        c.innerHTML = ht + `</tbody></table>`;
      } catch(e) { c.innerHTML = `Gagal memuat rekap.`; }
    }
    document.getElementById('filter-bulan').addEventListener('change', muatTabelLegerBulan);
    document.getElementById('filter-tahun').addEventListener('change', muatTabelLegerBulan);

    function pindahTab(t) {
      activeTab = t; ['scan','leger','admin','libur'].forEach(x => {
        document.getElementById('tab-'+x).classList.add('hidden');
        document.getElementById('btn-tab-'+x).className = "px-4 py-2 rounded-lg text-sm text-slate-600 hover:bg-slate-50";
      });
      document.getElementById('tab-'+t).classList.remove('hidden');
      document.getElementById('btn-tab-'+t).className = "px-4 py-2 rounded-lg text-sm bg-indigo-50 text-indigo-600";
      if(t === 'scan') muatLogKehadiranHarian();
      if(t === 'leger') { document.getElementById('filter-bulan').value = new Date().getMonth() + 1; muatTabelLegerBulan(); }
    }
    function showToast(p, j="success") {
      const c = document.getElementById('container-toast'); const t = document.createElement('div');
      t.className = `p-3 text-white text-xs rounded-lg shadow-lg ${j==="danger"?"bg-rose-600":j==="warning"?"bg-amber-500":"bg-emerald-600"}`;
      t.innerHTML = `${p}`; c.appendChild(t); setTimeout(() => t.remove(), 4000);
    }
  </script>
</body>
